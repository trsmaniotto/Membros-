<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciamento de Membros da Igreja</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
        .modal { display: none; position: fixed; z-index: 1; left: 0; top: 0; width: 100%; height: 100%; overflow: auto; background-color: rgb(0,0,0); background-color: rgba(0,0,0,0.4); }
        .modal-content { background-color: #fefefe; margin: 15% auto; padding: 20px; border: 1px solid #888; width: 80%; max-width: 500px; }
        .close { color: #aaa; float: right; font-size: 28px; font-weight: bold; }
        .close:hover, .close:focus { color: black; text-decoration: none; cursor: pointer; }
        input, select, button { margin: 5px; padding: 8px; }
        #filter { margin-bottom: 10px; }
    </style>
</head>
<body>
    <h1>Gerenciamento de Membros da Igreja</h1>
    <input type="text" id="filter" placeholder="Filtrar por nome..." onkeyup="filterTable()">
    <button onclick="openModal()">Adicionar Membro</button>
    <table id="membersTable">
        <thead>
            <tr>
                <th>Nome</th>
                <th>Email</th>
                <th>Telefone</th>
                <th>Cursos</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody id="membersBody">
            <!-- Dados serão carregados dinamicamente -->
        </tbody>
    </table>

    <div id="memberModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle">Adicionar Membro</h2>
            <form id="memberForm">
                <input type="hidden" id="memberId">
                <label for="name">Nome:</label>
                <input type="text" id="name" required><br>
                <label for="email">Email:</label>
                <input type="email" id="email" required><br>
                <label for="phone">Telefone:</label>
                <input type="tel" id="phone" required><br>
                <label>Cursos:</label><br>
                <input type="checkbox" name="curso1" value="Curso 1"> Curso 1<br>
                <input type="checkbox" name="curso2" value="Curso 2"> Curso 2<br>
                <input type="checkbox" name="curso3" value="Curso 3"> Curso 3<br>
                <button type="submit">Salvar</button>
            </form>
        </div>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbwDp2g--eUjynwswAER_MBdKs59mTVsgdcbZcJHSgQsb_pC1lALgv670OT5GsL9roP_UQ/exec';
        let members = [];

        document.addEventListener('DOMContentLoaded', loadMembers);

        function loadMembers() {
            fetch(scriptURL + '?action=get')
                .then(response => response.json())
                .then(data => {
                    members = data;
                    renderTable();
                })
                .catch(error => console.error('Erro ao carregar membros:', error));
        }

        function renderTable() {
            const tbody = document.getElementById('membersBody');
            tbody.innerHTML = '';
            members.forEach(member => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${member.name}</td>
                    <td>${member.email}</td>
                    <td>${member.phone}</td>
                    <td>${member.courses ? member.courses.join(', ') : ''}</td>
                    <td>
                        <button onclick="editMember('${member.id}')">Editar</button>
                        <button onclick="deleteMember('${member.id}', '${member.name}')">Excluir</button>
                        <button onclick="sendWhatsApp('${member.phone}')">WhatsApp</button>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        function filterTable() {
            const filter = document.getElementById('filter').value.toLowerCase();
            const rows = document.querySelectorAll('#membersBody tr');
            rows.forEach(row => {
                const name = row.cells[0].textContent.toLowerCase();
                row.style.display = name.includes(filter) ? '' : 'none';
            });
        }

        function openModal(member = null) {
            document.getElementById('memberModal').style.display = 'block';
            if (member) {
                document.getElementById('modalTitle').textContent = 'Editar Membro';
                document.getElementById('memberId').value = member.id;
                document.getElementById('name').value = member.name;
                document.getElementById('email').value = member.email;
                document.getElementById('phone').value = member.phone;
                // Reset checkboxes
                document.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
                if (member.courses) {
                    member.courses.forEach(course => {
                        const checkbox = document.querySelector(`input[name="${course}"]`);
                        if (checkbox) checkbox.checked = true;
                    });
                }
            } else {
                document.getElementById('modalTitle').textContent = 'Adicionar Membro';
                document.getElementById('memberForm').reset();
            }
        }

        function closeModal() {
            document.getElementById('memberModal').style.display = 'none';
        }

        document.getElementById('memberForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const id = document.getElementById('memberId').value;
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const courses = Array.from(document.querySelectorAll('input[name]:checked')).map(cb => cb.value);
            const member = { id, name, email, phone, courses };
            const action = id ? 'update' : 'add';
            fetch(scriptURL, {
                method: 'POST',
                body: JSON.stringify({ action, member }),
                headers: { 'Content-Type': 'application/json' }
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    loadMembers();
                    closeModal();
                } else {
                    alert('Erro ao salvar membro');
                }
            })
            .catch(error => console.error('Erro:', error));
        });

        function editMember(id) {
            const member = members.find(m => m.id === id);
            openModal(member);
        }

        function deleteMember(id, memberName) {
            if (!confirm(`Tem certeza que deseja excluir o membro ${memberName}?`)) return;
            fetch(scriptURL, {
                method: 'POST',
                body: JSON.stringify({ action: 'delete', id }),
                headers: { 'Content-Type': 'application/json' }
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    loadMembers();
                } else {
                    alert('Erro ao excluir membro');
                }
            })
            .catch(error => console.error('Erro:', error));
        }

        function sendWhatsApp(phone) {
            const url = `https://wa.me/${phone.replace(/\D/g, '')}`;
            window.open(url, '_blank');
        }
    </script>
</body>
</html>
