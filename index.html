<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciamento de Membros</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .table-responsive { max-height: 70vh; overflow-y: auto; }
        .checkmark { color: green; font-size: 1.2em; }
        .crossmark { color: red; font-size: 1.2em; }
        .btn-success { background-color: #28a745; border-color: #28a745; }
        .btn-success:hover { background-color: #218838; border-color: #1e7e34; }
        .spinner-border { width: 3rem; height: 3rem; }
        .whatsapp-btn { background-color: #25d366; border-color: #25d366; }
        .whatsapp-btn:hover { background-color: #128c7e; border-color: #128c7e; }
    </style>
</head>
<body>
    <div class="container-fluid mt-4">
        <h1 class="text-center mb-4"><i class="fas fa-users"></i> Gerenciamento de Membros</h1>
        
        <!-- Filtros -->
        <div class="row mb-3">
            <div class="col-md-3">
                <label for="groupFilter" class="form-label">Filtrar por Grupo:</label>
                <select id="groupFilter" class="form-select">
                    <option value="">Todos os Grupos</option>
                </select>
            </div>
            <div class="col-md-3">
                <label for="courseFilter" class="form-label">Filtrar por Curso:</label>
                <select id="courseFilter" class="form-select">
                    <option value="">Todos os Cursos</option>
                    <option value="fundamento">Fundamento</option>
                    <option value="imersao">Imersão</option>
                    <option value="voce_na_verdade">Você na Verdade</option>
                    <option value="batismo">Batismo</option>
                    <option value="identidade">Identidade</option>
                    <option value="inspiracao">Inspiração</option>
                    <option value="dch">DCH</option>
                    <option value="nt">NT</option>
                    <option value="rendicao">Rendição</option>
                </select>
            </div>
            <div class="col-md-3">
                <label for="nameSearch" class="form-label">Buscar por Nome:</label>
                <input type="text" id="nameSearch" class="form-control" placeholder="Digite o nome...">
            </div>
            <div class="col-md-3 d-flex align-items-end">
                <button id="applyFilters" class="btn btn-success me-2"><i class="fas fa-filter"></i> Aplicar Filtros</button>
                <button id="clearFilters" class="btn btn-secondary"><i class="fas fa-times"></i> Limpar Filtros</button>
            </div>
        </div>
        
        <!-- Contador -->
        <div class="mb-3">
            <p id="recordCounter">Registros encontrados: 0</p>
        </div>
        
        <!-- Spinner de Carregamento -->
        <div id="loadingSpinner" class="text-center mb-3" style="display: none;">
            <div class="spinner-border text-success" role="status">
                <span class="visually-hidden">Carregando...</span>
            </div>
            <p>Carregando membros...</p>
        </div>
        
        <!-- Mensagem de Erro -->
        <div id="errorMessage" class="alert alert-danger" style="display: none;">
            <i class="fas fa-exclamation-triangle"></i> Erro ao carregar os dados. Tente novamente.
        </div>
        
        <!-- Tabela -->
        <div class="table-responsive">
            <table id="membersTable" class="table table-striped table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>Nº Membro</th>
                        <th>Nome</th>
                        <th>Grupo</th>
                        <th>Telefone</th>
                        <th>Fundamento</th>
                        <th>Imersão</th>
                        <th>Você na Verdade</th>
                        <th>Batismo</th>
                        <th>Identidade</th>
                        <th>Inspiração</th>
                        <th>DCH</th>
                        <th>NT</th>
                        <th>Rendição</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="membersTableBody">
                    <!-- Dados serão inseridos aqui -->
                </tbody>
            </table>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const apiUrl = 'https://script.google.com/macros/s/AKfycbwDp2g--eUjynwswAER_MBdKs59mTVsgdcbZcJHSgQsb_pC1lALgv670OT5GsL9roP_UQ/exec';
        let allMembers = [];
        let filteredMembers = [];
        
        // Carregar dados ao abrir a página
        document.addEventListener('DOMContentLoaded', loadMembers);
        
        async function loadMembers() {
            showSpinner();
            hideError();
            try {
                const response = await fetch(apiUrl);
                if (!response.ok) throw new Error('Erro na resposta da API');
                allMembers = await response.json();
                filteredMembers = [...allMembers];
                populateGroupDropdown();
                renderTable(filteredMembers);
                updateCounter(filteredMembers.length);
            } catch (error) {
                console.error('Erro ao carregar membros:', error);
                showError();
            } finally {
                hideSpinner();
            }
        }
        
        function populateGroupDropdown() {
            const groups = [...new Set(allMembers.map(m => m.grupo).filter(g => g))];
            const groupFilter = document.getElementById('groupFilter');
            groups.forEach(group => {
                const option = document.createElement('option');
                option.value = group;
                option.textContent = group;
                groupFilter.appendChild(option);
            });
        }
        
        function renderTable(members) {
            const tbody = document.getElementById('membersTableBody');
            tbody.innerHTML = '';
            members.forEach(member => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${member.no_membro || ''}</td>
                    <td>${member.nome || ''}</td>
                    <td>${member.grupo || ''}</td>
                    <td>${member.telefone || ''}</td>
                    <td>${getIndicator(member.fundamento)}</td>
                    <td>${getIndicator(member.imersao)}</td>
                    <td>${getIndicator(member.voce_na_verdade)}</td>
                    <td>${getIndicator(member.batismo)}</td>
                    <td>${getIndicator(member.identidade)}</td>
                    <td>${getIndicator(member.inspiracao)}</td>
                    <td>${getIndicator(member.dch)}</td>
                    <td>${getIndicator(member.nt)}</td>
                    <td>${getIndicator(member.rendicao)}</td>
                    <td><a href="https://wa.me/55${cleanPhone(member.telefone)}" target="_blank" class="btn whatsapp-btn btn-sm"><i class="fab fa-whatsapp"></i> WhatsApp</a></td>
                `;
                tbody.appendChild(row);
            });
        }
        
        function getIndicator(value) {
            return value === 'Sim' ? '<i class="fas fa-check checkmark"></i>' : '<i class="fas fa-times crossmark"></i>';
        }
        
        function cleanPhone(phone) {
            return phone ? phone.replace(/\D/g, '') : '';
        }
        
        function updateCounter(count) {
            document.getElementById('recordCounter').textContent = `Registros encontrados: ${count}`;
        }
        
        function showSpinner() {
            document.getElementById('loadingSpinner').style.display = 'block';
        }
        
        function hideSpinner() {
            document.getElementById('loadingSpinner').style.display = 'none';
        }
        
        function showError() {
            document.getElementById('errorMessage').style.display = 'block';
        }
        
        function hideError() {
            document.getElementById('errorMessage').style.display = 'none';
        }
        
        // Filtros
        document.getElementById('applyFilters').addEventListener('click', applyFilters);
        document.getElementById('clearFilters').addEventListener('click', clearFilters);
        document.getElementById('nameSearch').addEventListener('input', applyFilters);
        
        function applyFilters() {
            const group = document.getElementById('groupFilter').value;
            const course = document.getElementById('courseFilter').value;
            const name = document.getElementById('nameSearch').value.toLowerCase();
            
            filteredMembers = allMembers.filter(member => {
                const matchesGroup = !group || member.grupo === group;
                const matchesCourse = !course || member[course] === 'Sim';
                const matchesName = !name || member.nome.toLowerCase().includes(name);
                return matchesGroup && matchesCourse && matchesName;
            });
            
            renderTable(filteredMembers);
            updateCounter(filteredMembers.length);
        }
        
        function clearFilters() {
            document.getElementById('groupFilter').value = '';
            document.getElementById('courseFilter').value = '';
            document.getElementById('nameSearch').value = '';
            filteredMembers = [...allMembers];
            renderTable(filteredMembers);
            updateCounter(filteredMembers.length);
        }
    </script>
</body>
</html>
